<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Wrapped</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body { height: 100%; }

    .page {
      min-height: 100%;
      background: #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      font-family: 'Poppins', sans-serif;
    }

    /*
      iPhone-frame.png: 1316×2680 native, transparent screen center.
      Displayed at 436×889 (393px screen width scale = 393/1185).
      Player sits at left=22, top=18, 393×850 — aligns with the
      transparent window in the PNG.
    */
    .phone-wrapper {
      position: relative;
      width: 436px;
      height: 889px;
      flex-shrink: 0;
      transform: scale(0.92);
    }

    /* Story player — behind the frame overlay */
    .phone-screen {
      position: absolute;
      left: 20px;
      top: 18px;
      width: 395px;
      height: 853px;
      overflow: hidden;
      border-radius: 48px;
      background: #000;
      z-index: 1;
    }

    /* Frame overlay — transparent center lets player show through */
    .phone-frame-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      display: block;
    }

    /* ── Entry screen ───────────────────────────────────────────────── */
    #entry-screen {
      position: absolute;
      inset: 0;
      z-index: 50;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    #entry-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #entry-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Story player internals ──────────────────────────────────────── */
    #story-container {
      position: absolute;
      inset: 0;
    }

    .story {
      position: absolute;
      inset: 0;
      will-change: transform;
      transform: translateX(100%);
    }

    .story video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .story-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.16;
      pointer-events: none;
    }

    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 54px;
      z-index: 20;
      pointer-events: none;
    }

    .status-bar svg {
      display: block;
      width: 100%;
      height: 54px;
    }

    #top-ui {
      position: absolute;
      top: 74px;
      left: 20px;
      right: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 18px;
      pointer-events: none;
    }

    #close-btn {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid #D8D8D8;
      background: transparent;
      color: #6A6A6A;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: background 0.15s;
    }

    #close-btn:active {
      background: rgba(0,0,0,0.06);
    }

    #progress-bar {
      position: relative;
      width: 100%;
      display: flex;
      gap: 4px;
    }

    .seg-highlight {
      position: absolute;
      border-radius: 9999px;
      background: #C1D7FF;
      pointer-events: none;
      opacity: 0;
      z-index: 0;
      transform: scale(0.7);
      transition: opacity 300ms ease, transform 300ms cubic-bezier(0.34,1.56,0.64,1);
    }

    .seg {
      position: relative;
      z-index: 1;
      height: 2px;
      flex: 1;
      border-radius: 9999px;
      background: #A8A8A8;
    }

    .seg.done,
    .seg.active {
      background: #040404;
    }

    .home-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 5px;
      background: rgba(0,0,0,0.20);
      border-radius: 3px;
      z-index: 30;
      pointer-events: none;
    }

    .tap-zone {
      position: absolute;
      top: 0; bottom: 0;
      width: 45%;
      z-index: 5;
      cursor: pointer;
    }

    #tap-left  { left: 0; }
    #tap-right { right: 0; }

    /* ── Stamps story ────────────────────────────────────────────────── */
    .stamp-group {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }
    .stamp-group.stamp-visible {
      opacity: 1;
    }
    .stamp-group.stamp-animating {
      animation: stamp-in 0.2s linear forwards;
    }
    @keyframes stamp-in {
      0%   { opacity: 0; transform: scale(2.5) rotate(var(--stamp-rot, -8deg)); }
      8%   { opacity: 1; transform: scale(2.5) rotate(var(--stamp-rot, -8deg)); }
      68%  { transform: scale(0.94) rotate(0deg); }
      84%  { transform: scale(1.03) rotate(0deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }
    .stamp-group.stamp-exit {
      animation: stamp-exit 0.48s cubic-bezier(0.4, 0, 1, 1) forwards;
    }
    @keyframes stamp-exit {
      from { opacity: 1; transform: translate(0, 0); }
      to   { opacity: 0; transform: translate(var(--ex-tx, 0px), var(--ex-ty, 0px)); }
    }
  </style>
</head>

/* ── Story player ─────────────────────────────────────────────────────── */
const pb        = document.getElementById('progress-bar');
const container = document.getElementById('story-container');
const TOTAL     = STORIES.length;

STORIES.forEach((story, i) => {
  const seg = document.createElement('div');
  seg.className = 'seg';
  seg.id = 'seg-' + i;
  pb.appendChild(seg);

  const slide = document.createElement('div');
  slide.className = 'story';
  slide.id = 'slide-' + i;

  if (story.type === 'color') {
    slide.style.background = story.bg;
    const label = document.createElement('span');
    label.className = 'story-label';
    label.style.color = story.textColor || 'rgba(0,0,0,0.16)';
    label.textContent = story.label || ('Story ' + (i + 1));
    slide.appendChild(label);
  } else if (story.type === 'stamps') {
    slide.style.background = '#FCFAF7';
    const revealEl = document.createElement('div');
    revealEl.id = 'stamps-reveal';
    revealEl.style.cssText = 'position:absolute;inset:0;background:#FCFAF7;';
    const revealVid = document.createElement('video');
    revealVid.id = 'stamps-reveal-vid';
    revealVid.src = 'Screens motion/Screen15.mp4';
    revealVid.playsInline = true;
    revealVid.muted = true;
    revealVid.preload = 'none';
    revealVid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
    revealVid.addEventListener('ended', () => {
      revealVid.currentTime = Math.max(0, revealVid.duration - 0.05);
      revealVid.pause();
    });
    revealEl.appendChild(revealVid);
    slide.appendChild(revealEl);
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 393 852');
    svg.setAttribute('width', '393');
    svg.setAttribute('height', '852');
    svg.style.cssText = 'position:absolute;inset:0;display:block;width:100%;height:100%;overflow:visible;';
    svg.innerHTML = STAMPS_SVG;
    slide.appendChild(svg);
  } else if (story.type === 'video') {
    slide.style.background = story.poster || '#000';
    const vid = document.createElement('video');
    vid.src = story.src;
    vid.playsInline = true;
    vid.muted = true;
    vid.preload = 'none';
    vid.addEventListener('ended', () => {
      if (i === TOTAL - 1) {
        showFinalScreen();
      } else {
        vid.currentTime = Math.max(0, vid.duration - 0.05);
        vid.pause();
      }
    });
    slide.appendChild(vid);
  } else if (story.type === 'image') {
    slide.style.background = story.poster || '#FCFAF7';
    const img = document.createElement('img');
    img.src = story.src;
    img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
    slide.appendChild(img);
  }

  container.appendChild(slide);
});

  ];

  // step=0: card0=LEFT, card1=CENTER, card2=RIGHT, cards3-7=STACK (matches Figma V1)
  let step = 0;
  const PHASE_NAMES = ['LEFT','CENTER','RIGHT','STACK','STACK','STACK','STACK','STACK'];

  function getPhase18(i) {
    return PHASE_NAMES[(i - step + 8) % 8];
  }

  const cards18 = SVG_INNER.map((inner) => {
    const d = document.createElement('div');
    d.style.cssText = 'position:absolute;overflow:hidden;mix-blend-mode:multiply;';
    const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','131 167 225 279');
    s.setAttribute('preserveAspectRatio','xMidYMid meet');
    s.style.cssText = 'display:block;width:100%;height:100%;';
    s.innerHTML = inner;
    d.appendChild(s); c.appendChild(d);
    return d;
  });

  function applyPos(div, pname) {
    const p = POS[pname];
    div.style.top = p.t+'px'; div.style.left = p.l+'px';
    div.style.width = p.w+'px'; div.style.height = p.h+'px';
    div.style.opacity = p.op; div.style.zIndex = p.z;
    div.style.borderRadius = p.rx+'px';
  }

  cards18.forEach((d, i) => { d.style.transition='none'; applyPos(d, getPhase18(i)); });

  requestAnimationFrame(() => {
    requestAnimationFrame(() => { cards18.forEach(d => { d.style.transition = TR; }); });
  });

  let exitingCard = null;
  let exitingHandler = null;

  function cancelPendingExit() {
    if (exitingCard && exitingHandler) {
      exitingCard.removeEventListener('transitionend', exitingHandler);
    }
    exitingCard = null;
    exitingHandler = null;
  }

  function advance18() {
    step = (step + 1) % 8;
    // card that just left LEFT (now diff=7) animates onward and out, then
    // silently resets into STACK once it's fully invisible
    cards18.forEach((d, i) => {
      if ((i - step + 8) % 8 === 7) {
        d.style.transition = TR;
        applyPos(d, 'EXIT');
        cancelPendingExit();
        exitingCard = d;
        exitingHandler = function onExitDone(e) {
          if (e.propertyName !== 'top') return; // wait for the full move, not the shorter opacity leg
          d.removeEventListener('transitionend', onExitDone);
          exitingCard = null;
          exitingHandler = null;
          d.style.transition = 'none';
          applyPos(d, 'STACK');
          void d.offsetWidth;
          d.style.transition = TR;
        };
        d.addEventListener('transitionend', exitingHandler);
      }
    });
    requestAnimationFrame(() => {
      cards18.forEach((d, i) => {
        if ((i - step + 8) % 8 === 7) return;
        applyPos(d, getPhase18(i));
      });
    });
  }

  /* ── Entrance: visible cards pop in from small before the loop begins ── */
  const ENTRANCE_SCALE   = 0.6;
  const ENTRANCE_ORDER   = ['LEFT', 'RIGHT', 'CENTER']; // supporting cards settle first, hero card last
  const ENTRANCE_STAGGER = 110;
  const ENTRANCE_DUR     = 550;
  const ENTRANCE_TR      = `top ${ENTRANCE_DUR}ms cubic-bezier(0.34,1.56,0.64,1),left ${ENTRANCE_DUR}ms cubic-bezier(0.34,1.56,0.64,1),width ${ENTRANCE_DUR}ms cubic-bezier(0.34,1.56,0.64,1),height ${ENTRANCE_DUR}ms cubic-bezier(0.34,1.56,0.64,1),opacity ${Math.round(ENTRANCE_DUR * 0.6)}ms ease,border-radius ${ENTRANCE_DUR}ms ease`;

  function shrunkBox(pos, k) {
    const cx = pos.l + pos.w / 2, cy = pos.t + pos.h / 2;
    const w = pos.w * k, h = pos.h * k;
    return { t: cy - h / 2, l: cx - w / 2, w, h, op: 0, z: pos.z, rx: pos.rx };
  }

  function applyBox(div, box) {
    div.style.top = box.t + 'px'; div.style.left = box.l + 'px';
    div.style.width = box.w + 'px'; div.style.height = box.h + 'px';
    div.style.opacity = box.op; div.style.zIndex = box.z;
    div.style.borderRadius = box.rx + 'px';
  }

  let entrance18Timers = [];

  function playEntrance18(onDone) {
    entrance18Timers.forEach(clearTimeout);
    entrance18Timers = [];

    const byPhase = {};
    cards18.forEach((d, i) => {
      const phase = getPhase18(i);
      if (phase === 'LEFT' || phase === 'CENTER' || phase === 'RIGHT') byPhase[phase] = d;
    });

    ENTRANCE_ORDER.forEach(phase => {
      const d = byPhase[phase];
      if (!d) return;
      d.style.transition = 'none';
      applyBox(d, shrunkBox(POS[phase], ENTRANCE_SCALE));
    });
    void c.offsetWidth; // force the shrunk start state to paint before animating out of it

    ENTRANCE_ORDER.forEach((phase, idx) => {
      const d = byPhase[phase];
      if (!d) return;
      entrance18Timers.push(setTimeout(() => {
        d.style.transition = ENTRANCE_TR;
        applyPos(d, phase);
      }, idx * ENTRANCE_STAGGER));
    });

    const totalTime = (ENTRANCE_ORDER.length - 1) * ENTRANCE_STAGGER + ENTRANCE_DUR;
    entrance18Timers.push(setTimeout(() => {
      // hand off to the shared transition so the ongoing loop feels continuous
      cards18.forEach(d => { d.style.transition = TR; });
      onDone();
    }, totalTime));
  }

  let advance18Timer   = null;
  let story18Entering  = false;

  function startStory18() {
    if (advance18Timer || story18Entering) return;
    story18Entering = true;
    playEntrance18(() => {
      story18Entering = false;
      advance18Timer = setInterval(advance18, 2000);
    });
  }

  function stopStory18() {
    clearInterval(advance18Timer);
    advance18Timer = null;
    story18Entering = false;
    entrance18Timers.forEach(clearTimeout);
    entrance18Timers = [];
    cancelPendingExit();
    // snap every card instantly to its canonical resting spot for the
    // current step, so nothing is left mid-flight while off-screen
    cards18.forEach((d, i) => {
      d.style.transition = 'none';
      applyPos(d, getPhase18(i));
    });
    void c.offsetWidth;
    cards18.forEach(d => { d.style.transition = TR; });
  }

  window._story18 = { storyIdx: s18i, start: startStory18, stop: stopStory18 };
  sl.appendChild(c);
})();

  };

  function makeActionBtn(label, bg, iconColor, iconType) {

  successBadge.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><g stroke="#D3F49E" stroke-width="3.6">${ICON_PATHS.check}</g></svg>`;
  document.querySelector('.phone-screen').appendChild(successBadge);

  function showSwipeSuccess(onDone) {
    const POP_DUR  = 450;
    const HOLD_AFTER = 500;

    successBadge.style.display = 'flex';
    successBadge.style.opacity = '0';
    successBadge.style.transform = 'translate(-50%,-50%) scale(0.5)';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        successBadge.style.transition = `opacity 0.2s ease, transform ${POP_DUR}ms cubic-bezier(0.34,1.7,0.64,1)`;
        successBadge.style.opacity = '1';
        successBadge.style.transform = 'translate(-50%,-50%) scale(1)';

      successBadge.style.display = 'none';

  function hideSwipeSuccess() {

    successBadge.style.display = 'none';
    successBadge.style.opacity = '0';

  const actionRow = document.createElement('div');
  actionRow.id = 'action-row-19';
  actionRow.dataset.storyIdx = s19i;
  actionRow.style.cssText = 'position:absolute;left:50%;top:calc(50% + 205px);transform:translateX(-50%) translateY(10px);opacity:0;display:none;align-items:center;gap:32px;z-index:7;';
  actionRow.appendChild(deleteBtn.holder);
  actionRow.appendChild(keepBtn.holder);
  document.querySelector('.phone-screen').appendChild(actionRow);

  const DRAG_HALO_RANGE = 140;

  function setActionFeedback(x, instant) {
    const t = Math.min(1, Math.abs(x) / DRAG_HALO_RANGE);
    const active   = x > 0 ? keepBtn : deleteBtn;
    const inactive = x > 0 ? deleteBtn : keepBtn;
    const tr = instant ? 'none' : 'opacity 0.35s ease, transform 0.35s ease';

    active.halo.style.transition = tr;
    active.halo.style.opacity = x === 0 ? '0' : String(active.haloMax * t);
    active.halo.style.transform = `translate(-50%,-50%) scale(${0.75 + t * 0.45})`;
    active.btn.style.transition = instant ? 'none' : 'opacity 0.35s ease';

    inactive.halo.style.opacity = '0';
    inactive.halo.style.transform = 'translate(-50%,-50%) scale(0.75)';
    inactive.btn.style.transition = instant ? 'none' : 'opacity 0.35s ease';
    inactive.btn.style.opacity = x === 0 ? '1' : String(1 - t * 0.55);

  let topIdx = 0;
  let dragging = false;
  let startX = 0, currentX = 0;
  let flyingOut = null;
  let entranceDone = false;
  let entrancePlayed = false;

  const ENTRANCE_DELAY = 2000;
  const ENTRANCE_STAGGER = 90;
  const ENTRANCE_DUR = 280;

  function playEntrance() {
    const visibleCount = Math.min(4, cardEls.length - topIdx);
    for (let d = 0; d < visibleCount; d++) {
      const el = cardEls[topIdx + d];
      const cd = Math.min(d, 3);
      const restTransform = d === 0 ? 'translateY(0) scale(1)' : `translateY(${cd * 16}px) scale(${1 - cd * 0.065})`;
      setTimeout(() => {
        el.style.transition = `transform ${ENTRANCE_DUR}ms cubic-bezier(0.34,1.56,0.64,1), opacity ${ENTRANCE_DUR}ms ease`;
        el.style.opacity = '1';
        el.style.transform = restTransform;
      }, d * ENTRANCE_STAGGER);
    }
    setTimeout(() => {
      entranceDone = true;
      actionRow.style.display = 'flex';
      requestAnimationFrame(() => {
        actionRow.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
        actionRow.style.transform = 'translateX(-50%) translateY(0)';
        actionRow.style.opacity = '1';
      });
    }, (visibleCount - 1) * ENTRANCE_STAGGER + ENTRANCE_DUR);
  }

  function scheduleEntrance19() {
    if (entrancePlayed) return;
    clearTimeout(window._entrance19Timer);
    window._entrance19Timer = setTimeout(() => {
      entrancePlayed = true;
      playEntrance();
    }, ENTRANCE_DELAY);
  }

  function cancelEntrance19() {
    clearTimeout(window._entrance19Timer);
  }

  window._story19Entrance = { storyIdx: s19i, schedule: scheduleEntrance19, cancel: cancelEntrance19, isDone: () => entranceDone, hideSuccessBadge: hideSwipeSuccess };

  function updateStack() {
    cardEls.forEach((el, i) => {
      if (el === flyingOut) return;
      if (i < topIdx) { el.style.display = 'none'; return; }
      el.style.display = '';
      const d = i - topIdx;
      el.style.zIndex = 10 - d;
      el.style.visibility = d > 3 ? 'hidden' : 'visible';
      if (d === 0 && !dragging) {
        el.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';

  function triggerSwipe(dir) {
    if (!entranceDone || dragging || flyingOut || topIdx >= cardEls.length) return;

    setTimeout(() => setActionFeedback(0, false), 400);

  deleteBtn.btn.addEventListener('click', () => triggerSwipe(-1));

  function onStart(e) {

    e.stopPropagation();
    e.preventDefault();
    dragging = true;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX;
    currentX = 0;
    const top = cardEls[topIdx];
    top.style.transition = 'none';
    top.style.cursor = 'grabbing';
  }

  function onMove(e) {
    if (!dragging) return;
    e.stopPropagation();
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    currentX = pt.clientX - startX;
    const rot = currentX * 0.06;

  }

  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    e.stopPropagation();
    setActionFeedback(0, false);
    const top = cardEls[topIdx];
    top.style.cursor = 'grab';
    if (Math.abs(currentX) > 75) {
      swipeOut(currentX > 0 ? 1 : -1);
    } else {
      top.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      top.style.transform = 'translateX(0) rotate(0deg)';
    }
  }

  wrap.addEventListener('touchstart', onStart, { passive: false });
  wrap.addEventListener('touchmove', onMove, { passive: false });
  wrap.addEventListener('touchend', onEnd, { passive: false });
  wrap.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', function(e) { if (dragging) onMove(e); });
  document.addEventListener('mouseup', function(e) { if (dragging) onEnd(e); });

(function() {
  const s17i = STORIES.findIndex(s => s.src && s.src.includes('Screen17'));
  if (s17i < 0) return;
  const slide17 = document.getElementById('slide-' + s17i);

  const successVideo = document.createElement('video');
  successVideo.id = 's17-success-video';
  successVideo.src = 'Screens motion/Screen17-success.mp4';
  successVideo.muted = true;
  successVideo.playsInline = true;
  successVideo.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:8;cursor:pointer;';
  document.querySelector('.phone-screen').appendChild(successVideo);

  let successEnded = false;

  successVideo.addEventListener('ended', () => {
    // hold on the last frame — do not auto-continue
    successEnded = true;
  });

  successVideo.addEventListener('click', (e) => {
    if (!successEnded) return; // ignore taps while it's still playing
    const rect = successVideo.getBoundingClientRect();
    const tappedRight = (e.clientX - rect.left) > rect.width / 2;
    if (tappedRight) {
      goTo(currentIdx + 1, 1); // continue to the next screen, as normal
    } else {
      // left side: dismiss the success state and return to Screen 17 itself
      successVideo.style.display = 'none';
      successVideo.pause();
      successVideo.currentTime = 0;
      successEnded = false;
    }
  });

  const stack = document.createElement('div');
  stack.id = 'cta-stack-17';
  stack.dataset.storyIdx = s17i;
  stack.style.cssText = 'position:absolute;left:50%;bottom:52px;display:none;flex-direction:column;align-items:center;gap:12px;z-index:7;transform:translateX(-50%);';

  const primaryBtn = document.createElement('button');
  primaryBtn.type = 'button';
  primaryBtn.textContent = 'Create Folder';
  primaryBtn.style.cssText = 'width:200px;background:#000;color:#fff;border:1.5px solid transparent;border-radius:9999px;font-size:14px;font-weight:500;font-family:inherit;padding:10px 24px;cursor:pointer;opacity:0;transform:translateY(24px);';

  const secondaryBtn = document.createElement('button');
  secondaryBtn.type = 'button';
  secondaryBtn.textContent = 'Ignore the Problem';
  secondaryBtn.style.cssText = 'width:200px;background:transparent;color:#000;border:1.5px solid #D8D8D8;border-radius:9999px;font-size:14px;font-weight:500;font-family:inherit;padding:10px 24px;cursor:pointer;opacity:0;transform:translateY(24px);';

  stack.appendChild(primaryBtn);
  stack.appendChild(secondaryBtn);
  document.querySelector('.phone-screen').appendChild(stack);

  primaryBtn.addEventListener('click', () => {
    clearTimeout(window._cta17Timer);
    stack.style.display = 'none';
    const bgVideo = slide17?.querySelector('video');
    if (bgVideo) bgVideo.pause();
    successEnded = false;
    successVideo.style.display = 'block';
    successVideo.currentTime = 0;
    successVideo.play().catch(() => {});
  });

  const CTA_STAGGER = 150;

  function showCta17() {
    clearTimeout(window._cta17Timer);
    stack.style.display = 'flex';
    [primaryBtn, secondaryBtn].forEach(btn => {
      btn.style.transition = 'none';
      btn.style.opacity = '0';
      btn.style.transform = 'translateY(24px)';
    });
    successVideo.pause();
    successVideo.currentTime = 0;
    successVideo.style.display = 'none';
    successEnded = false;
    window._cta17Timer = setTimeout(() => {
      [primaryBtn, secondaryBtn].forEach((btn, i) => {
        setTimeout(() => {
          btn.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.45s ease';
          btn.style.opacity = '1';
          btn.style.transform = 'translateY(0)';
        }, i * CTA_STAGGER);
      });
    }, 3000);
  }

  function hideCta17() {
    clearTimeout(window._cta17Timer);
    stack.style.display = 'none';
    successVideo.pause();
    successVideo.currentTime = 0;
    successVideo.style.display = 'none';
    successEnded = false;
  }

  window._story17Cta = { storyIdx: s17i, show: showCta17, hide: hideCta17 };
})();

let currentIdx  = 0;
let isAnimating = false;
const STAMPS_IDX = STORIES.findIndex(s => s.type === 'stamps');
let stampsStep  = 0;
let stampsPhase = 0; // 0=revealing  1=all shown  2=cleared (reveal visible)

const STAMP_ROTS = ['-9deg', '7deg', '-6deg', '10deg', '-8deg', '6deg', '-11deg', '8deg'];

const STAMP_EXITS = [
  { tx: '-260px', ty: '220px'  },
  { tx: '280px',  ty: '-230px' },
  { tx: '320px',  ty: '40px'   },
  { tx: '160px',  ty: '-280px' },
  { tx: '-300px', ty: '80px'   },
  { tx: '-240px', ty: '-180px' },
  { tx: '40px',   ty: '340px'  },
  { tx: '240px',  ty: '260px'  },
];

const getStampsRevealVid = () => document.getElementById('stamps-reveal-vid');

function revealStamp(step) {
  const slide = getSlide(STAMPS_IDX);
  const g = slide.querySelector(`[data-stamp="${step}"]`);
  if (!g) return;
  g.style.setProperty('--stamp-rot', STAMP_ROTS[step] || '-7deg');
  g.classList.add('stamp-visible', 'stamp-animating');
  g.addEventListener('animationend', () => g.classList.remove('stamp-animating'), { once: true });
  if (step === 7) stampsPhase = 1;
}

function clearStamps() {
  const slide = getSlide(STAMPS_IDX);
  slide.querySelectorAll('[data-stamp]').forEach((g, idx) => {
    const ex = STAMP_EXITS[idx] || { tx: '200px', ty: '0px' };
    g.classList.remove('stamp-animating');
    g.style.setProperty('--ex-tx', ex.tx);
    g.style.setProperty('--ex-ty', ex.ty);
    void g.offsetWidth;
    g.classList.add('stamp-exit');
  });
  stampsPhase = 2;
  const vid = getStampsRevealVid();
  if (vid) { vid.currentTime = 0; vid.play().catch(() => {}); }
}

function resetStamps(visibleCount) {
  stampsPhase = visibleCount === 7 ? 1 : 0;
  const vid = getStampsRevealVid();
  if (vid) { vid.pause(); vid.currentTime = 0; }
  const slide = getSlide(STAMPS_IDX);
  for (let s = 0; s < 8; s++) {
    const g = slide.querySelector(`[data-stamp="${s}"]`);
    if (!g) continue;
    g.classList.remove('stamp-animating', 'stamp-exit');
    if (s <= visibleCount) g.classList.add('stamp-visible');
    else g.classList.remove('stamp-visible');
  }
}

const getSlide = i => document.getElementById('slide-' + i);
const getSeg   = i => document.getElementById('seg-' + i);

function updateProgress(idx) {
  for (let i = 0; i < TOTAL; i++) {
    const s = getSeg(i);
    s.className = 'seg' + (i < idx ? ' done' : i === idx ? ' active' : '');
  }
  updateGroupHighlight(idx);
}

// Purely visual grouping layer on top of the progress bar — chapters of
// related stories, 0-indexed inclusive ranges. Does not affect navigation
// or the segment done/active logic above.
const STORY_GROUPS = [
  [0, 4],   // segments 1–5
  [5, 6],   // segments 6–7
  [7, 11],  // segments 8–12
  [12, 13], // segments 13–14
  [14, 17], // segments 15–18
  [18, 20], // segments 19–21
  [21, 21], // segment 22 (ending) stands alone
];

// One small rounded outline per segment, not one shape around the whole
// group. Pool sized to the largest group so every slot can be reused
// without creating/destroying elements on every transition.
const MAX_GROUP_SIZE = Math.max(...STORY_GROUPS.map(([s, e]) => e - s + 1));
const segHighlightPool = Array.from({ length: MAX_GROUP_SIZE }, () => {
  const el = document.createElement('div');
  el.className = 'seg-highlight';
  pb.appendChild(el);
  return el;
});

let lastHighlightGroupKey = null;

function updateGroupHighlight(idx) {
  const group = STORY_GROUPS.find(([start, end]) => idx >= start && idx <= end);
  const groupKey = group ? group.join('-') : null;
  const groupChanged = groupKey !== lastHighlightGroupKey;
  lastHighlightGroupKey = groupKey;

  const PAD = 4; // same padding on all four sides, derived from the real segment box
  const activeIndices = group ? Array.from({ length: group[1] - group[0] + 1 }, (_, k) => group[0] + k) : [];

  segHighlightPool.forEach((ring, slot) => {
    if (slot < activeIndices.length) {
      const segEl = getSeg(activeIndices[slot]);
      if (!segEl) return;
      // offsetLeft/Top/Width/Height are plain CSS layout values relative to
      // the nearest positioned ancestor (#progress-bar) — unlike
      // getBoundingClientRect(), they are unaffected by the .phone-wrapper
      // scale(0.92) transform further up the tree, so no double-scaling.
      const top    = segEl.offsetTop  - PAD;
      const left   = segEl.offsetLeft - PAD;
      const width  = segEl.offsetWidth  + PAD * 2;
      const height = segEl.offsetHeight + PAD * 2;

      if (groupChanged) {
        // reposition instantly while invisible, then scale/fade it in fresh
        ring.style.transition = 'none';
        ring.style.top = top + 'px';
        ring.style.left = left + 'px';
        ring.style.width = width + 'px';
        ring.style.height = height + 'px';
        ring.style.opacity = '0';
        ring.style.transform = 'scale(0.7)';
        void ring.offsetWidth;
        ring.style.transition = 'opacity 300ms ease, transform 300ms cubic-bezier(0.34,1.56,0.64,1)';
      } else {
        ring.style.top = top + 'px';
        ring.style.left = left + 'px';
        ring.style.width = width + 'px';
        ring.style.height = height + 'px';
      }
      ring.style.opacity = '1';
      ring.style.transform = 'scale(1)';
    } else if (groupChanged) {
      // not part of the new group — gently fade away right where it is
      ring.style.transition = 'opacity 300ms ease, transform 300ms ease';
      ring.style.opacity = '0';
      ring.style.transform = 'scale(0.7)';
    }
  });
}

function preloadAdjacent(idx) {
  [-1, 0, 1].forEach(offset => {
    const j = idx + offset;
    if (j < 0 || j >= TOTAL) return;
    const vid = getSlide(j)?.querySelector('video');
    if (vid && vid.preload !== 'auto') vid.preload = 'auto';
  });
}

function initPositions() {
  for (let i = 0; i < TOTAL; i++) {
    const el = getSlide(i);
    el.style.transition = 'none';
    el.style.transform  = i === 0 ? 'translateX(0)' : 'translateX(100%)';
  }
}

function goTo(nextIdx, direction) {
  if (nextIdx < 0 || nextIdx >= TOTAL) return;
  if (isAnimating || nextIdx === currentIdx) return;
  isAnimating = true;

  const fromEl  = getSlide(currentIdx);
  const toEl    = getSlide(nextIdx);
  const fromVid = fromEl.querySelector('video');
  if (fromVid) { fromVid.pause(); fromVid.currentTime = 0; }

  fromEl.style.transition = 'none';
  fromEl.style.transform  = 'translateX(-100%)';
  toEl.style.transition   = 'none';
  toEl.style.transform    = 'translateX(0)';

  currentIdx  = nextIdx;
  isAnimating = false;
  updateProgress(currentIdx);
  preloadAdjacent(currentIdx);
  if (currentIdx === TOTAL - 1) primeFinalVideo();
  const _skip = document.getElementById('skip-btn-19');
  if (_skip) {
    clearTimeout(window._skip19Timer);
    _skip.style.transition = 'none';
    _skip.style.opacity = '0';
    _skip.style.transform = 'translateX(-50%) translateY(80px)';
    _skip.style.display = 'none';
    if (currentIdx === parseInt(_skip.dataset.storyIdx)) {
      _skip.style.display = '';
      window._skip19Timer = setTimeout(() => {
        _skip.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1),opacity 0.5s ease';
        _skip.style.transform = 'translateX(-50%) translateY(0)';
        _skip.style.opacity = '1';
      }, 5000);
    }
  }
  if (window._story19Entrance) window._story19Entrance.hideSuccessBadge();
  const _actionRow = document.getElementById('action-row-19');
  if (_actionRow) {
    const _isStory19 = window._story19Entrance && currentIdx === window._story19Entrance.storyIdx;
    const _alreadyAssembled = window._story19Entrance && window._story19Entrance.isDone();
    _actionRow.style.transition = 'none';
    if (_isStory19 && _alreadyAssembled) {
      _actionRow.style.display = 'flex';
      _actionRow.style.opacity = '1';
      _actionRow.style.transform = 'translateX(-50%) translateY(0)';
    } else {
      _actionRow.style.opacity = '0';
      _actionRow.style.transform = 'translateX(-50%) translateY(10px)';
      _actionRow.style.display = 'none';
    }
  }
  if (window._story19Entrance) {
    if (currentIdx === window._story19Entrance.storyIdx) {
      window._story19Entrance.schedule();
    } else {
      window._story19Entrance.cancel();
    }
  }
  if (window._story17Cta) {
    if (currentIdx === window._story17Cta.storyIdx) {
      window._story17Cta.show();
    } else {
      window._story17Cta.hide();
    }
  }
  if (window._story18) {
    if (currentIdx === window._story18.storyIdx) {
      window._story18.start();
    } else {
      window._story18.stop();
    }
  }
  if (currentIdx === STAMPS_IDX) {
    if (direction > 0) {
      stampsStep = 0;
      resetStamps(-1); // hide all stamps, reset reveal video
      requestAnimationFrame(() => revealStamp(0)); // animate first stamp in
    } else {
      stampsStep = 7;
      resetStamps(7); // show all stamps statically, phase = 1
    }
  }
  if (nextIdx !== STAMPS_IDX) {
    const toVid = toEl.querySelector('video');
    if (toVid) { toVid.currentTime = 0; toVid.play().catch(() => {}); }
  }
}

document.getElementById('tap-left').addEventListener('click', () => {
  if (currentIdx === STAMPS_IDX) {
    if (stampsPhase === 2) { resetStamps(7); stampsStep = 7; }
    else if (stampsStep > 0) { stampsStep--; resetStamps(stampsStep); }
    else goTo(currentIdx - 1, -1);
  } else {
    goTo(currentIdx - 1, -1);
  }
});

document.getElementById('tap-right').addEventListener('click', () => {
  if (currentIdx === STAMPS_IDX) {
    if (stampsPhase === 0 && stampsStep < 7) revealStamp(++stampsStep);
    else if (stampsPhase === 1) clearStamps();
    else if (stampsPhase === 2) goTo(currentIdx + 1, 1);
  } else if (window._story19Entrance && currentIdx === window._story19Entrance.storyIdx) {
    // swipe-card story: tap-right-to-advance is disabled so an in-progress
    // drag can never be misread as a tap. Advancing only happens via the
    // Skip button or automatically once every card has been swiped away.
  } else {
    goTo(currentIdx + 1, 1);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') {
    if (currentIdx === STAMPS_IDX) {
      if (stampsPhase === 0 && stampsStep < 7) revealStamp(++stampsStep);
      else if (stampsPhase === 1) clearStamps();
      else if (stampsPhase === 2) goTo(currentIdx + 1, 1);
    } else goTo(currentIdx + 1, 1);
  }
  if (e.key === 'ArrowLeft') {
    if (currentIdx === STAMPS_IDX) {
      if (stampsPhase === 2) { resetStamps(7); stampsStep = 7; }
      else if (stampsStep > 0) { stampsStep--; resetStamps(stampsStep); }
      else goTo(currentIdx - 1, -1);
    } else goTo(currentIdx - 1, -1);
  }
});

const entryScreen = document.getElementById('entry-screen');
const entryVideoEl = document.getElementById('entry-video');
if (entryVideoEl) {
  entryVideoEl.addEventListener('ended', () => {
    entryVideoEl.pause();
  });
}

function showEndScreen() {
  document.getElementById('end-screen').style.display = '';
}

let finalScreenTimers = [];
let finalVideoPrimed  = false;

// Force the browser to fetch + decode the ending video's first frame ahead
// of time, while Screen 23 is still playing, so showFinalScreen() never has
// to wait on it — avoids the black-frame gap between the two screens.
function primeFinalVideo() {
  if (finalVideoPrimed) return;
  const video = document.getElementById('final-video');
  if (!video) return;
  finalVideoPrimed = true;
  video.load();
  const p = video.play();
  if (p && p.catch) {
    p.then(() => video.pause()).catch(() => {});
  } else {
    video.pause();
  }
}

function showFinalScreen() {
  const screen    = document.getElementById('final-screen');
  const video     = document.getElementById('final-video');
  const lead      = document.getElementById('final-lead');
  const card      = document.getElementById('final-card');
  const title     = document.getElementById('final-title');
  const shareBtn  = document.getElementById('final-share-btn');
  const keepBtn   = document.getElementById('final-keep-btn');

  finalScreenTimers.forEach(clearTimeout);
  finalScreenTimers = [];

  card.style.transition = 'none';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.85)';

  [lead, title, shareBtn, keepBtn].forEach(el => {
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px) scale(0.96)';
  });

  video.style.transition = 'none';
  video.style.display = 'block';
  video.style.opacity = '1';

  screen.style.display = 'block';
  video.currentTime = 0;
  video.play().catch(() => {});

  const popIn = (el, delay) => {
    finalScreenTimers.push(setTimeout(() => {
      el.style.transition = 'opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      el.style.opacity = '1';
      el.style.transform = el === card ? 'scale(1)' : 'translateY(0) scale(1)';
    }, delay));
  };

  // video's intro moment ends — dissolve it away to the solid background
  // color right before the recap content starts revealing on top of it
  finalScreenTimers.push(setTimeout(() => {
    video.style.transition = 'opacity 0.6s ease';
    video.style.opacity = '0';
  }, 3700));
  finalScreenTimers.push(setTimeout(() => {
    video.pause();
    video.style.display = 'none';
  }, 4300));

  popIn(lead,     3900);
  popIn(title,    4160);
  popIn(card,     4420);
  popIn(shareBtn, 4740);
  popIn(keepBtn,  5060);
}

function hideFinalScreen() {
  finalScreenTimers.forEach(clearTimeout);
  finalScreenTimers = [];
  const screen = document.getElementById('final-screen');
  const video  = document.getElementById('final-video');
  screen.style.display = 'none';
  video.pause();
  video.currentTime = 0;
  video.style.transition = 'none';
  video.style.display = 'block';
  video.style.opacity = '1';
}

function showEntry() {
  for (let i = 0; i < TOTAL; i++) {
    const vid = getSlide(i)?.querySelector('video');
    if (vid) { vid.pause(); vid.currentTime = 0; }
  }
  stampsStep = 0;
  stampsPhase = 0;
  resetStamps(-1);
  isAnimating = false;
  currentIdx  = 0;
  document.getElementById('end-screen').style.display = 'none';
  hideFinalScreen();
  initPositions();
  updateProgress(0);
  entryScreen.style.display = '';
  const entryVideo = document.getElementById('entry-video');
  if (entryVideo) { entryVideo.currentTime = 0; entryVideo.play().catch(() => {}); }

  const introScreenEl = document.getElementById('intro-screen');
  const introVideoEl  = document.getElementById('intro-video');
  if (introScreenEl) introScreenEl.style.display = 'none';
  if (introVideoEl) { introVideoEl.pause(); introVideoEl.currentTime = 0; }
  const progressBarEl = document.getElementById('progress-bar');
  if (progressBarEl) progressBarEl.style.display = '';
}

document.getElementById('close-btn').addEventListener('click', showEntry);

entryScreen.addEventListener('click', () => {
  entryScreen.classList.add('fade-out');
  entryScreen.addEventListener('transitionend', () => {
    entryScreen.style.display = 'none';
    entryScreen.classList.remove('fade-out');
    const entryVideo = document.getElementById('entry-video');
    if (entryVideo) entryVideo.pause();
  }, { once: true });

  const introScreen = document.getElementById('intro-screen');
  const introVideo  = document.getElementById('intro-video');
  const progressBar = document.getElementById('progress-bar');

  const startFirstStory = () => {
    const firstVid = getSlide(0)?.querySelector('video');
    if (firstVid) { firstVid.currentTime = 0; firstVid.play().catch(() => {}); }
  };

  if (introVideo) {
    progressBar.style.display = 'none';
    introScreen.style.display = 'block';
    introVideo.currentTime = 0;
    introVideo.play().catch(() => {});
    introVideo.addEventListener('ended', function onIntroEnd() {
      introVideo.removeEventListener('ended', onIntroEnd);
      introScreen.style.display = 'none';
      progressBar.style.display = '';
      startFirstStory();
    }, { once: true });
  } else {
    startFirstStory();
  }
});

initPositions();
updateProgress(0);
preloadAdjacent(0);
</script>
